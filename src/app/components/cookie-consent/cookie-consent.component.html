<div class="cookie-banner" *ngIf="showBanner" role="dialog" aria-label="Cookie consent">
  <button class="cookie-close" (click)="acceptCookies()" aria-label="Dismiss">
    <mat-icon>close</mat-icon>
  </button>
  <p class="cookie-message">
    We use essential cookies to keep you signed in and ensure the platform works securely.
    We do not use advertising or tracking cookies.
  </p>
  <div class="cookie-actions">
    <button class="cookie-ok" (click)="acceptCookies()">OK</button>
  </div>
</div>
