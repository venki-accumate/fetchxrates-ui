<div class="entity-wrapper" *ngIf="matDataSource.data.length > 0">

  <!-- Search Filter -->
  <div class="searchRow">
    <mat-icon class="mat-icon-search">search</mat-icon>
    <input type="text" placeholder="Type here to search..." (input)="applyFilter($event)" class="filterInput" />
  </div>

  <!-- Table -->
  <div class="table-container">
    <table mat-table [dataSource]="matDataSource" class="entity-table" matSort>

      <ng-container *ngFor="let col of columnHeaders" [matColumnDef]="col">
        <th mat-header-cell *matHeaderCellDef [mat-sort-header]="col">
          {{ col }}
          <mat-icon *ngIf="sort?.active === col && sort?.direction" class="sortIcon">
            {{ sort.direction === 'asc' ? 'arrow_drop_up' : 'arrow_drop_down' }}
          </mat-icon>
        </th>
        <td mat-cell *matCellDef="let data">

          <!-- Normal View -->
          <ng-container *ngIf="!isEditing(data, col)">
            <span (dblclick)="onCellDoubleClick(data, col)"
                  [class.editable-cell]="editable"
                  class="cell-content">
              {{ data[col] }}
            </span>
          </ng-container>

          <!-- Edit View -->
          <ng-container *ngIf="isEditing(data, col)">
            <div class="edit-container">
              <input type="text"
                     [(ngModel)]="editingValue"
                     [class.error-input]="hasError"
                     class="edit-input"
                     (keyup.enter)="onSaveEdit()"
                     (keyup.escape)="onCancelEdit()">
              <button mat-icon-button (click)="onSaveEdit()" class="icon-button">
                <mat-icon>check_circle</mat-icon>
              </button>
              <button mat-icon-button (click)="onCancelEdit()" class="icon-cancel">
                <mat-icon>cancel</mat-icon>
              </button>
            </div>
          </ng-container>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>
  </div>

  <!-- Paginator -->
  <mat-paginator [style.display]="disablePagination ? 'none' : ''" [pageSizeOptions]="[5, 10, 25, 50, 100]" [pageSize]="10" showFirstLastButtons
    aria-label="Select page">
  </mat-paginator>

</div>

<div class="empty-state" *ngIf="matDataSource.data.length === 0 && columnHeaders.length > 0">
  <mat-icon>inbox</mat-icon>
  <p>No data to display</p>
</div>
