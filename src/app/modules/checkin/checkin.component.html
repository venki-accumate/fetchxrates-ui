<ngx-spinner 
  bdColor="rgba(0,0,0,0.8)" 
  size="large" 
  color="#22b71b" 
  type="line-scale"
  [fullScreen]="true">
  <p style="color: white; margin-top: 20px;">Loading...</p>
</ngx-spinner>

<div class="checkin-page" *ngIf="!apiCallPending">
  <!-- Pricing Section with integrated signup fields -->
  <app-pricing 
    [showSignupFields]="showSignupFields"
    [userData]="userData"
    [selectedPlan]="selectedPlan"
    [termsAccepted]="termsAccepted"
    [error]="error"
    (userDataChange)="userData = $event"
    (termsAcceptedChange)="termsAccepted = $event" 
    (startStripeCheckout)="startCheckout($event)"></app-pricing>
</div>
